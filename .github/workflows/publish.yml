name: Upload Python Package

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  release-check:
    name: Check Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    env:
      UV_PYTHON: ${{ matrix.python-version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Verify release
        run: |
          uv lock --check
          uv run pytest
          uv run ruff check

  release-build:
    runs-on: ubuntu-latest
    needs:
      - release-check
    env:
      UV_PYTHON: "3.10"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Build release distributions
        run: uv build --package rosettakit --no-sources --out-dir dist --clear

      - name: Check release distributions
        run: uvx twine check --strict dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: release-dists
          path: dist/
          if-no-files-found: error

  pypi-publish:
    runs-on: ubuntu-latest
    needs:
      - release-build
    permissions:
      contents: read
      id-token: write

    environment:
      name: pypi
      url: https://pypi.org/project/rosettakit/${{ github.event.release.tag_name }}

    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist/

      - name: Publish release distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
